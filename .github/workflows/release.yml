name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run zip
      - name: Attach Web Store zip to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: inline-scribe.zip
          generate_release_notes: true
